<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d98a"/>
      <stop offset="50%" stop-color="#f4c25b"/>
      <stop offset="100%" stop-color="#ff8c2b"/>
    </linearGradient>
  </defs>
  <!-- Foreground kept inside the central safe zone for adaptive icons -->
  <g transform="translate(512 512)" fill="none" stroke="url(#gold)">
    <!-- mandala rings -->
    <circle r="250" stroke-width="6" opacity="0.9"/>
    <circle r="210" stroke-width="3" opacity="0.6"/>
    <g>
      <!-- 12 petals -->
      <g id="petal" stroke-width="4" opacity="0.85">
        <path d="M0 -250 q 36 60 0 120 q -36 -60 0 -120 Z"/>
      </g>
      <use href="#petal" transform="rotate(30)"/>
      <use href="#petal" transform="rotate(60)"/>
      <use href="#petal" transform="rotate(90)"/>
      <use href="#petal" transform="rotate(120)"/>
      <use href="#petal" transform="rotate(150)"/>
      <use href="#petal" transform="rotate(180)"/>
      <use href="#petal" transform="rotate(210)"/>
      <use href="#petal" transform="rotate(240)"/>
      <use href="#petal" transform="rotate(270)"/>
      <use href="#petal" transform="rotate(300)"/>
      <use href="#petal" transform="rotate(330)"/>
    </g>
  </g>
  <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-size="300"
        fill="url(#gold)">ॐ</text>
</svg>
